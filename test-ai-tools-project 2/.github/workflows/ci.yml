name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run -s build || echo 'build placeholder'
      - name: Test
        run: npm test || echo 'no tests yet'
      - name: Storybook build
        run: npm --workspace=@gstack/react-ui run storybook -- --quiet || echo 'storybook placeholder'
