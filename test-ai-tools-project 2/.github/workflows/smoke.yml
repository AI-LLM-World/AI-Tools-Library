name: Smoke Tests

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Build backend
        run: npm --workspace=@gstack/backend run build
      - name: Start backend
        run: |
          node packages/backend/dist/index.js &
          echo $! > ./backend.pid
      - name: Wait for health
        run: |
          for i in {1..30}; do
            if curl --silent --fail http://localhost:4000/health >/dev/null 2>&1; then
              echo "backend healthy"; exit 0;
            fi
            sleep 1
          done
          echo "backend did not become healthy"; exit 1
      - name: Run smoke tests
        run: node scripts/ci-smoke.js
      - name: Stop backend
        if: always()
        run: |
          if [ -f ./backend.pid ]; then
            kill "$(cat ./backend.pid)" || true
          fi
