name: CI — Smoke Tests (Tools & Admin)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    env:
      # CI can set SMOKE_API_BASE to point at the deployed/testable service.
      SMOKE_API_BASE: ${{ secrets.SMOKE_API_BASE }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run smoke tests
        run: |
          pytest tests/test_tools_admin_smoke.py -q
